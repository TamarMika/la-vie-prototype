<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA VIE — Urgences Médicales · Application</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E1251B; --red-soft:#F04438; --red-ink:#B42318;
  --ink:#16241F; --ink-2:#3B4A45; --muted:#7C8B86; --muted-2:#A6B2AD;
  --bg:#E9EEEC; --card:#FFFFFF; --card-2:#F5F8F7; --line:#E4EAE8;
  --green:#12936E; --green-2:#16A37B; --green-bg:#E7F4EF;
  --amber:#C77700; --amber-bg:#FBF1E2; --blue:#3B82C4;
  --r-xl:30px; --r-lg:24px; --r-md:18px; --r-sm:12px;
  --shadow:0 16px 40px -18px rgba(22,36,31,.30);
  --shadow-sm:0 8px 22px -12px rgba(22,36,31,.22);
  --shadow-soft:0 2px 10px -4px rgba(22,36,31,.12);
  --display:'Outfit',sans-serif; --body:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body); color:var(--ink);
  background:radial-gradient(900px 500px at 50% -8%, rgba(18,147,110,.10), transparent 60%),
    radial-gradient(700px 420px at 90% 110%, rgba(225,37,27,.05), transparent 55%), var(--bg);
  -webkit-font-smoothing:antialiased; min-height:100vh;}
.wrap{max-width:920px;margin:0 auto;padding:28px 24px 70px}

.head{text-align:center;margin-bottom:24px}
.brand{display:inline-flex;align-items:center;gap:11px;margin-bottom:16px}
.brand .word{font-family:var(--display);font-weight:800;font-size:22px;letter-spacing:.01em;line-height:.85;text-align:left}
.brand .sub{font-family:var(--display);font-weight:600;font-size:8.5px;letter-spacing:.32em;color:var(--muted);display:block;margin-top:3px}
.roles{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px;box-shadow:var(--shadow-soft);margin-bottom:18px}
.roles button{display:flex;align-items:center;gap:8px;border:0;background:transparent;color:var(--muted);font-family:var(--display);font-weight:600;font-size:13.5px;padding:9px 18px;border-radius:999px;cursor:pointer;transition:.16s}
.roles button.on{background:var(--ink);color:#fff}
.roles button .rd{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.6}
.roles button.on[data-role="medic"] .rd{background:var(--green-2);opacity:1}
.head h1{font-family:var(--display);font-weight:700;font-size:23px;letter-spacing:-.01em;margin-bottom:8px}
.head p{font-size:14px;color:var(--ink-2);max-width:520px;margin:0 auto;line-height:1.5}
.head .hint{display:inline-flex;align-items:center;gap:8px;margin-top:15px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow-soft);padding:8px 15px;border-radius:999px;font-size:13px;font-weight:500;color:var(--ink-2)}
.head .hint b{color:var(--red);font-weight:700}
.head .hint .pp{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pp 1.6s ease-in-out infinite}
@keyframes pp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

.phone-stage{display:flex;justify-content:center}
.phone{width:404px;background:#0e1513;border-radius:50px;padding:13px;box-shadow:var(--shadow)}
.screen{position:relative;background:var(--card-2);border-radius:38px;overflow:hidden;height:812px;display:flex;flex-direction:column}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:148px;height:27px;background:#0e1513;border-radius:0 0 18px 18px;z-index:40}
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:14px 26px 4px;font-size:13px;font-weight:600;color:var(--ink);z-index:30}
.statusbar.dark{color:#fff}
.statusbar .r{display:flex;gap:7px;align-items:center;opacity:.8}
.view{flex:1;overflow-y:auto;overflow-x:hidden}
.view::-webkit-scrollbar{width:0}
.pad{padding:6px 22px 26px}

/* INTRO */
.intro{height:100%;display:flex;flex-direction:column;padding:0 26px 26px;background:radial-gradient(420px 280px at 50% 8%, rgba(18,147,110,.12), transparent 70%), var(--card-2)}
.intro .top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.intro .mark{width:92px;height:92px;border-radius:26px;background:var(--card);box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.intro h2{font-family:var(--display);font-weight:700;font-size:26px;line-height:1.15;letter-spacing:-.01em;margin-bottom:12px}
.intro h2 .hl{color:var(--red)}
.intro .lead{font-size:14.5px;color:var(--ink-2);line-height:1.55;max-width:300px}
.feats{display:flex;flex-direction:column;gap:11px;margin:28px 0 8px;width:100%}
.feat{display:flex;align-items:center;gap:13px;background:var(--card);border-radius:var(--r-md);padding:13px 15px;box-shadow:var(--shadow-soft);text-align:left}
.feat .fi{width:40px;height:40px;border-radius:12px;background:var(--green-bg);color:var(--green);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.feat .ft{font-family:var(--display);font-weight:600;font-size:14px}
.feat .fs{font-size:12px;color:var(--muted);margin-top:1px;line-height:1.3}
.intro .cta{background:var(--red);color:#fff;border:0;border-radius:var(--r-lg);padding:17px;font-family:var(--display);font-weight:600;font-size:16px;cursor:pointer;width:100%;box-shadow:0 14px 28px -12px rgba(225,37,27,.6);transition:.15s}
.intro .cta:hover{background:var(--red-ink)}
.intro .legal{text-align:center;font-size:11px;color:var(--muted-2);margin-top:13px}

/* patient app header */
.apphead{display:flex;align-items:center;justify-content:space-between;padding:8px 22px 4px}
.apphead .hello{font-size:13px;color:var(--muted);font-weight:500}
.apphead .name{font-family:var(--display);font-weight:700;font-size:21px;margin-top:1px}
.apphead .me{width:42px;height:42px;border-radius:14px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:600;font-size:15px}
.status{margin:14px 22px 0;background:var(--green-bg);border:1px solid rgba(18,147,110,.18);border-radius:var(--r-lg);padding:15px 17px}
.status .sh{display:flex;align-items:center;gap:11px}
.status .sc{width:34px;height:34px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.status .st{font-family:var(--display);font-weight:700;font-size:15.5px;color:var(--green)}
.status .ss{font-size:12px;color:var(--ink-2);margin-top:1px}
.status .meta{display:flex;gap:8px;margin-top:13px}
.status .pill{flex:1;background:rgba(255,255,255,.7);border-radius:12px;padding:9px 10px;text-align:center}
.status .pill .pn{font-family:var(--display);font-weight:700;font-size:15px;color:var(--ink)}
.status .pill .pl{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500}
.sos-zone{display:flex;flex-direction:column;align-items:center;padding:30px 0 22px}
.sos-cap{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:20px}
.sos-wrap{position:relative;width:228px;height:228px;display:flex;align-items:center;justify-content:center}
.sos-ring{position:absolute;width:228px;height:228px;border-radius:50%;border:2px solid rgba(225,37,27,.4);opacity:0;animation:ring 3s ease-out infinite}
@keyframes ring{0%{transform:scale(.8);opacity:.6}100%{transform:scale(1.08);opacity:0}}
.sos-btn{position:relative;width:188px;height:188px;border-radius:50%;border:0;cursor:pointer;background:radial-gradient(circle at 50% 38%, var(--red-soft), var(--red) 62%);color:#fff;box-shadow:0 22px 44px -16px rgba(225,37,27,.55), 0 0 0 10px rgba(225,37,27,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:transform .12s}
.sos-btn:active{transform:scale(.96)}
.sos-btn .lab{font-family:var(--display);font-weight:800;font-size:48px;letter-spacing:.04em;line-height:1}
.sos-btn .sl{font-size:12px;font-weight:500;letter-spacing:.16em;opacity:.92}
.sos-hint{font-size:13px;color:var(--muted);margin-top:22px;text-align:center;max-width:250px;line-height:1.45}
.who{margin:6px 22px 0}
.who .wl{font-size:13px;color:var(--ink);font-weight:600;margin-bottom:13px}
.mchips{display:flex;gap:14px;overflow-x:auto;padding-bottom:3px}
.mchips::-webkit-scrollbar{height:0}
.mchip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
.av{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:600;font-size:18px;color:#fff;position:relative}
.mchip .mn{font-size:11.5px;font-weight:500;color:var(--ink-2)}
.av .vb{position:absolute;right:-1px;bottom:-1px;width:18px;height:18px;border-radius:50%;background:var(--green);border:2.5px solid var(--card-2);display:flex;align-items:center;justify-content:center}
.qlinks{margin:22px 22px 0;display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:var(--r-md);overflow:hidden;border:1px solid var(--line)}
.qlink{display:flex;align-items:center;gap:13px;background:var(--card);padding:14px 16px;cursor:pointer;transition:.12s}
.qlink:hover{background:var(--card-2)}
.qlink .qi{width:38px;height:38px;border-radius:11px;background:var(--card-2);color:var(--ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.qlink .qt{font-family:var(--display);font-weight:600;font-size:14px}
.qlink .qs{font-size:11.5px;color:var(--muted);margin-top:1px}
.qlink .qc{margin-left:auto;color:var(--muted-2)}

.tabbar{display:flex;justify-content:space-around;align-items:center;padding:11px 14px 20px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line)}
.tabbar button{background:0;border:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--muted);font-size:10.5px;font-weight:500;transition:.15s}
.tabbar button.on{color:var(--red)}
.tabbar button.on.medic{color:var(--green)}
.tabbar svg{width:23px;height:23px}

.s-title{font-family:var(--display);font-weight:700;font-size:24px;margin:10px 0 3px}
.s-sub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.45}
.profcard{background:var(--ink);border-radius:var(--r-lg);padding:20px;color:#fff;display:flex;align-items:center;gap:15px}
.profcard .pav{width:60px;height:60px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:600;font-size:23px;color:#fff}
.profcard .pn{font-family:var(--display);font-weight:700;font-size:19px}
.profcard .pm{font-size:12.5px;color:#b8c4c0;margin-top:3px}
.verif{display:inline-flex;align-items:center;gap:6px;background:rgba(18,147,110,.22);color:#7ee3bf;padding:5px 11px;border-radius:999px;font-size:11.5px;font-weight:600;margin-top:11px}
.med-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:16px}
.med-cell{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:15px;box-shadow:var(--shadow-soft)}
.med-cell .k{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:7px}
.med-cell .v{font-family:var(--display);font-weight:700;font-size:18px}
.med-cell.full{grid-column:1/-1}
.chiplist{display:flex;flex-wrap:wrap;gap:7px;margin-top:3px}
.dchip{font-size:12px;font-weight:500;padding:6px 11px;border-radius:999px;background:rgba(225,37,27,.08);color:var(--red-ink)}
.dchip.n{background:var(--card-2);color:var(--ink-2);border:1px solid var(--line)}
.blood{color:var(--red)}
.credits{background:linear-gradient(135deg,var(--green) 0%, var(--green-2) 100%);color:#fff;border-radius:var(--r-lg);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.credits .cl{font-size:12px;opacity:.9}
.credits .cn{font-family:var(--display);font-weight:800;font-size:34px;line-height:1;margin-top:5px}
.credits .cn span{font-size:16px;opacity:.7}
.plan{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:17px;margin-bottom:12px;box-shadow:var(--shadow-soft);position:relative}
.plan.cur{border:1.5px solid var(--green);box-shadow:0 12px 28px -16px rgba(18,147,110,.5)}
.plan .ph{display:flex;align-items:baseline;justify-content:space-between}
.plan .pname{font-family:var(--display);font-weight:700;font-size:17px}
.plan .price{font-family:var(--display);font-weight:700;font-size:20px;color:var(--ink)}
.plan .price span{font-size:12px;color:var(--muted);font-weight:500}
.plan ul{list-style:none;margin-top:11px;display:flex;flex-direction:column;gap:8px}
.plan li{font-size:13px;color:var(--ink-2);display:flex;gap:9px;align-items:flex-start}
.plan li svg{flex:0 0 auto;margin-top:2px;color:var(--green)}
.cur-tag{position:absolute;top:-9px;right:16px;background:var(--green);color:#fff;font-size:10px;font-weight:600;padding:4px 11px;border-radius:999px}
.paylab{font-size:13px;font-weight:600;margin:18px 0 11px}
.pay-row{display:flex;gap:9px}
.pay{flex:1;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 4px;font-size:11px;color:var(--muted);box-shadow:var(--shadow-soft)}
.pay b{display:block;font-family:var(--display);font-size:13px;color:var(--ink);font-weight:600;margin-bottom:1px}

.sheet-scrim{position:absolute;inset:0;background:rgba(16,28,24,.5);backdrop-filter:blur(2px);display:none;align-items:flex-end;z-index:60;border-radius:38px;overflow:hidden}
.sheet-scrim.show{display:flex;animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{width:100%;background:var(--card);border-radius:28px 28px 0 0;padding:10px 22px 26px;animation:up .26s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(40px)}to{transform:translateY(0)}}
.grab{width:42px;height:5px;border-radius:5px;background:var(--line);margin:6px auto 16px}
.sheet h3{font-family:var(--display);font-weight:700;font-size:20px}
.sheet p.h{font-size:13px;color:var(--muted);margin:5px 0 18px;line-height:1.4}
.msel{display:flex;flex-direction:column;gap:10px}
.mrow{display:flex;align-items:center;gap:14px;padding:12px;border:1px solid var(--line);border-radius:var(--r-md);cursor:pointer;transition:.15s}
.mrow:hover{border-color:var(--green);background:var(--green-bg)}
.mrow .mi{font-family:var(--display);font-weight:600;font-size:15px}
.mrow .ms{font-size:12px;color:var(--muted);margin-top:1px}
.mrow .chev{margin-left:auto;color:var(--muted-2)}
.etypes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.etype{border:1px solid var(--line);border-radius:var(--r-md);padding:16px 8px;text-align:center;cursor:pointer;transition:.15s}
.etype:hover{border-color:var(--red);background:rgba(225,37,27,.04)}
.etype .ei{width:46px;height:46px;margin:0 auto 9px;border-radius:14px;background:var(--card-2);color:var(--red);display:flex;align-items:center;justify-content:center}
.etype .en{font-family:var(--display);font-weight:600;font-size:13px}
.bigbtn{width:100%;margin-top:16px;padding:16px;background:var(--red);color:#fff;border:0;border-radius:var(--r-lg);font-family:var(--display);font-weight:600;font-size:15px;cursor:pointer}

/* patient live */
.live{background:var(--ink);color:#fff;height:100%;display:flex;flex-direction:column;animation:fade .25s}
.live-top{padding:18px 24px 12px;display:flex;align-items:center;justify-content:space-between}
.live-top .lt{font-size:12.5px;font-weight:600;letter-spacing:.02em;display:flex;align-items:center;gap:9px;color:#ffd9d6}
.pulsedot{width:9px;height:9px;border-radius:50%;background:var(--red-soft);animation:pp 1.2s infinite}
.live-cancel{background:rgba(255,255,255,.14);border:0;color:#fff;font-weight:500;font-size:12.5px;padding:8px 14px;border-radius:999px;cursor:pointer}
.live-status{padding:4px 24px 18px}
.live-status .big{font-family:var(--display);font-weight:700;font-size:25px;line-height:1.15}
.live-status .sm{font-size:13px;color:#b8c4c0;margin-top:7px}
.mapcard{margin:0 18px;border-radius:var(--r-lg);overflow:hidden;background:#dfe6e3;position:relative;height:268px;box-shadow:0 14px 30px -16px rgba(0,0,0,.5)}
.mapcard svg{position:absolute;inset:0;width:100%;height:100%}
.eta-pill{position:absolute;top:14px;left:14px;background:#fff;color:var(--ink);border-radius:14px;padding:9px 14px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px}
.eta-pill .en{font-family:var(--display);font-weight:700;font-size:21px;line-height:1}
.eta-pill .el{font-size:10px;color:var(--muted);font-weight:500;margin-top:2px}
.eta-pill .ed{width:1px;height:28px;background:var(--line)}
.live-info{flex:1;background:var(--card-2);border-radius:26px 26px 0 0;margin-top:16px;padding:18px 22px;color:var(--ink)}
.li-row{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--line)}
.li-row:last-child{border-bottom:0}
.li-row .ic{width:38px;height:38px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--red);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.li-row .lk{font-size:11.5px;color:var(--muted);font-weight:500}
.li-row .lv{font-family:var(--display);font-weight:600;font-size:14px;margin-top:1px}
.li-row .badge{margin-left:auto;font-size:12px;font-weight:600;color:var(--green);display:flex;align-items:center;gap:6px}
.li-row .badge.warn{color:var(--amber)}

/* ===================== PARAMEDIC ===================== */
.medic{height:100%;display:flex;flex-direction:column;animation:fade .22s}
.medic-body{flex:1;overflow-y:auto;overflow-x:hidden}
.medic-body::-webkit-scrollbar{width:0}
.m-foot{padding:14px 20px 22px;border-top:1px solid var(--line);background:var(--card)}
.m-btn{width:100%;padding:17px;border:0;border-radius:var(--r-lg);font-family:var(--display);font-weight:700;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:.15s}
.m-btn.green{background:var(--green);color:#fff;box-shadow:0 14px 28px -14px rgba(18,147,110,.7)}
.m-btn.red{background:var(--red);color:#fff;box-shadow:0 14px 28px -14px rgba(225,37,27,.6)}
.m-btn.ink{background:var(--ink);color:#fff}
.m-btn.ghost{background:var(--card-2);color:var(--ink);border:1px solid var(--line);box-shadow:none}
.m-sub{width:100%;text-align:center;background:0;border:0;color:var(--muted);font-size:13px;font-weight:500;padding:12px 0 2px;cursor:pointer}
.m-strip{display:flex;align-items:center;gap:11px;padding:10px 22px;border-bottom:1px solid var(--line)}
.m-strip .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px var(--green-bg)}
.m-strip .who2{font-family:var(--display);font-weight:600;font-size:13.5px}
.m-strip .duty{font-size:11px;color:var(--muted)}
.m-strip .unit{margin-left:auto;font-family:var(--display);font-weight:700;font-size:12px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:5px 10px}

/* dashboard */
.board{padding:14px 22px 6px}
.board .bt{font-family:var(--display);font-weight:700;font-size:21px}
.board .bs{font-size:12.5px;color:var(--muted);margin-top:2px;margin-bottom:6px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.kpi2{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:14px;box-shadow:var(--shadow-soft)}
.kpi2 .ki{width:34px;height:34px;border-radius:10px;background:var(--green-bg);color:var(--green);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.kpi2 .kn{font-family:var(--display);font-weight:700;font-size:21px;line-height:1}
.kpi2 .kl{font-size:11px;color:var(--muted);margin-top:4px}
.b-sec{font-size:12px;font-weight:600;color:var(--muted);margin:22px 0 11px;text-transform:uppercase;letter-spacing:.04em}
.chartcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:16px 16px 12px;box-shadow:var(--shadow-soft)}
.chartcard svg{width:100%;height:96px;display:block}
.assign{background:var(--card);border:1px dashed var(--muted-2);border-radius:var(--r-md);padding:18px;text-align:center;box-shadow:var(--shadow-soft)}

function cityBase(w,h,opts){
  opts=opts||{};

  let s='<rect width="'+w+'" height="'+h+'" fill="#e8ede9"/>';
  s+='<rect x="'+X(.05)+'" y="'+Y(.45)+'" width="'+X(.19)+'" height="'+Y(.2)+'" rx="9" fill="#d3e5cd"/>';
  [[.34,.22,.30,.15],[.72,.24,.22,.13],[.34,.46,.30,.17],[.72,.45,.22,.18],[.07,.71,.17,.18],[.72,.71,.22,.16],[.40,.73,.26,.16]]
    .forEach(b=>s+='<rect x="'+X(b[0])+'" y="'+Y(b[1])+'" width="'+X(b[2])+'" height="'+Y(b[3])+'" rx="6" fill="#dde4df"/>');
  s+='<path d="M0 0 H'+w+' V'+rH+' C '+X(.72)+' '+(rH+12)+', '+X(.46)+' '+(rH-14)+', '+X(.26)+' '+(rH+6)+' S '+X(.06)+' '+(rH+2)+', 0 '+(rH-8)+' Z" fill="#bcd6e8"/>';
  s+='<path d="M0 '+(rH-8)+' C '+X(.06)+' '+(rH+2)+', '+X(.26)+' '+(rH+10)+', '+X(.46)+' '+(rH-2)+' S '+X(.72)+' '+(rH-16)+', '+w+' '+(rH-2)+'" fill="none" stroke="#a8cae0" stroke-width="2.5"/>';
  const major=['M0 '+Y(.40)+' H'+w,'M0 '+Y(.70)+' H'+w,'M'+X(.32)+' '+rH+' V'+h,'M'+X(.70)+' '+rH+' V'+h,'M'+X(.10)+' '+Y(.95)+' L'+X(.90)+' '+Y(.20)];
  const minor=['M0 '+Y(.55)+' H'+w,'M0 '+Y(.84)+' H'+w,'M'+X(.50)+' '+rH+' V'+h];
  minor.forEach(d=>s+='<path d="'+d+'" stroke="#d7ded9" stroke-width="5" fill="none" stroke-linecap="round"/>');
  major.forEach(d=>s+='<path d="'+d+'" stroke="#ccd6cf" stroke-width="9" fill="none" stroke-linecap="round"/>');
  minor.forEach(d=>s+='<path d="'+d+'" stroke="#eef2ef" stroke-width="3" fill="none" stroke-linecap="round"/>');
  major.forEach(d=>s+='<path d="'+d+'" stroke="#f6f8f6" stroke-width="6" fill="none" stroke-linecap="round"/>');
  if(opts.labels){
    const fs=Math.max(9,Math.round(h*0.026));
    s+='<text x="'+X(.5)+'" y="'+Y(.075)+'" fill="#7ba6c4" font-family="Inter,sans-serif" font-size="'+fs+'" font-weight="600" text-anchor="middle" letter-spacing="1.5">FLEUVE CONGO</text>';
    s+='<text x="'+X(.19)+'" y="'+Y(.36)+'" fill="#9aa8a2" font-family="Inter,sans-serif" font-size="'+(fs-1)+'" font-weight="700" letter-spacing="1">GOMBE</text>';
    s+='<text x="'+X(.74)+'" y="'+Y(.66)+'" fill="#9aa8a2" font-family="Inter,sans-serif" font-size="'+(fs-1)+'" font-weight="700" letter-spacing="1">LIMETE</text>';
  }
  return s;
}
function cityRouteMap(w,h,destKind,ids){
  const X=f=>+(f*w).toFixed(1), Y=f=>+(f*h).toFixed(1);
  const sx=X(.16), sy=Y(.88), dx=X(.82), dy=Y(.30);
  const routeD='M'+sx+' '+sy+' C '+X(.32)+' '+Y(.80)+', '+X(.30)+' '+Y(.60)+', '+X(.50)+' '+Y(.56)+' S '+X(.70)+' '+Y(.42)+', '+dx+' '+dy;
  const dest = destKind==='hospital' ? gAt(dx,dy,hospSVG()) : gAt(dx,dy,pinSVG('#E1251B'));
  return cityBase(w,h,{labels:true})
    + '<path d="'+routeD+'" fill="none" stroke="#E1251B" stroke-width="7" stroke-linecap="round" opacity=".16"/>'
    + '<path id="'+ids.route+'" d="'+routeD+'" fill="none" stroke="#E1251B" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="1 8"/>'
    + '<circle cx="'+sx+'" cy="'+sy+'" r="5" fill="#16241F" stroke="#fff" stroke-width="2"/>'
    + dest + gAt(sx,sy,ambSVG(),ids.amb);
}

  setTimeout(()=>{ if(document.getElementById('liveBig')){big.textContent='Ambulance en route'; sm.textContent='Équipe paramédicale · plaque LV-204';}},2200);
  clearInterval(liveTimer);
  liveTimer=setInterval(()=>{
    etaSeconds=Math.max(0,etaSeconds-1); ambT=Math.min(1,ambT+(1/(6*60+20)));

function weekChart(){
  const days=['L','M','M','J','V','S','D'], vals=[3,5,4,6,5,7,5], today=5, max=7, W=320,H=96,n=7,slot=W/n,bw=18,base=H-20;
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet"><line x1="0" y1="'+base+'" x2="'+W+'" y2="'+base+'" stroke="#E4EAE8" stroke-width="1.5"/>';
  vals.forEach((v,i)=>{ const bh=(v/max)*(base-8), x=slot*i+slot/2-bw/2, y=base-bh, col=i===today?'#12936E':'#dbe6e0';
    s+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="5" fill="'+col+'"/>';
    s+='<text x="'+(slot*i+slot/2)+'" y="'+(H-4)+'" fill="#9aa8a2" font-family="Inter,sans-serif" font-size="11" font-weight="600" text-anchor="middle">'+days[i]+'</text>';
    if(i===today) s+='<text x="'+(slot*i+slot/2)+'" y="'+(y-6)+'" fill="#12936E" font-family="Outfit,sans-serif" font-size="11" font-weight="700" text-anchor="middle">'+v+'</text>';
  });
  return s+'</svg>';
}

    const btn=document.getElementById('mVerify'); btn.textContent='Analyse en cours…'; btn.disabled=true; btn.style.opacity=.7;

      document.getElementById('vresultSlot').innerHTML='<div class="vresult"><div class="vi"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div><div><div class="vrt">Identité confirmée · '+m.name+'</div><div class="vrs">Correspondance 99,2% · membre LA VIE vérifié</div></div></div>';
      document.querySelector('.m-foot').innerHTML='<button class="m-btn green" id="mToFile">Ouvrir le dossier médical</button>';
      document.getElementById('mToFile').addEventListener('click',()=>gotoMedic('file'));
    },1700);
  });
}
function medicFile(){
  const m=MISSION;
  appview.innerHTML='<div class="medic">'+medicStrip()+'<div class="medic-body"><div class="mfile">'+
    '<div class="mfhead"><div class="mfa" style="background:'+m.col+'">'+m.init+'</div><div><div class="mfn">'+m.name+'</div><div class="mfm">'+m.sex+' · '+m.age+' · '+m.type+'</div><div class="mfv"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>Identité vérifiée</div></div></div>'+
    '<div class="alertban"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><div><div class="at">Allergie : Iode</div><div class="as">À signaler avant tout produit de contraste</div></div></div>'+
    '<div class="med-grid"><div class="med-cell"><div class="k">Groupe sanguin</div><div class="v blood">'+m.blood+'</div></div><div class="med-cell"><div class="k">Âge</div><div class="v">'+m.age+'</div></div>'+
    '<div class="med-cell full"><div class="k">Allergies</div><div class="chiplist">'+m.allergies.map(a=>'<span class="dchip">'+a+'</span>').join('')+'</div></div>'+
    '<div class="med-cell full"><div class="k">Traitements en cours</div><div class="chiplist">'+m.meds.map(a=>'<span class="dchip n">'+a+'</span>').join('')+'</div></div>'+
    '<div class="med-cell full"><div class="k">Antécédents</div><div class="chiplist">'+m.cond.map(a=>'<span class="dchip n">'+a+'</span>').join('')+'</div></div>'+
    '<div class="med-cell full"><div class="k">Contact d\'urgence</div><div class="v" style="font-size:14px">'+m.contact+'</div></div></div></div><div style="height:14px"></div></div>'+
    '<div class="m-foot"><button class="m-btn red" id="mCare">Démarrer la prise en charge</button></div></div>';
  document.getElementById('mCare').addEventListener('click',()=>gotoMedic('care'));
}
function medicCare(){
  const v=medicVitals;
  const stepDone='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
  appview.innerHTML='<div class="medic">'+medicStrip()+'<div class="medic-body"><div class="care">'+
    '<div style="font-family:var(--display);font-weight:700;font-size:22px;margin:4px 0 14px">Prise en charge</div>'+
    '<div class="stepper">'+
      '<div class="step done"><div class="sdot">'+stepDone+'</div><div class="sl2">Mission acceptée &amp; trajet</div></div>'+
      '<div class="step done"><div class="sdot">'+stepDone+'</div><div class="sl2">Arrivée sur place</div></div>'+
      '<div class="step done"><div class="sdot">'+stepDone+'</div><div class="sl2">Identité vérifiée</div></div>'+
      '<div class="step active"><div class="sdot">4</div><div class="sl2">Soins en cours</div></div>'+
      '<div class="step todo"><div class="sdot">5</div><div class="sl2">Transport vers l\'hôpital</div></div>'+
    '</div>'+
    '<div class="vt2">Constantes — appuyez pour relever</div>'+
    '<div class="vitals">'+
      '<div class="vital '+(v.pouls?'set':'')+'" data-v="pouls"><div class="vic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2-5 4 10 2-5h6"/></svg></div><div class="vv '+(v.pouls?'':'empty')+'">'+(v.pouls||'—')+'</div><div class="vl">Pouls</div></div>'+
      '<div class="vital '+(v.tension?'set':'')+'" data-v="tension"><div class="vic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div><div class="vv '+(v.tension?'':'empty')+'">'+(v.tension||'—')+'</div><div class="vl">Tension</div></div>'+
      '<div class="vital '+(v.spo2?'set':'')+'" data-v="spo2"><div class="vic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a7 7 0 0 0-7 7c0 5 7 11 7 11s7-6 7-11a7 7 0 0 0-7-7z"/></svg></div><div class="vv '+(v.spo2?'':'empty')+'">'+(v.spo2||'—')+'</div><div class="vl">SpO₂</div></div>'+
    '</div>'+
    '<div class="notebox"><div class="nl">Note d\'intervention</div><div class="nt">Patient conscient, douleur thoracique. Oxygène administré. Aspirine en cours — antécédent d\'infarctus confirmé au dossier.</div></div>'+
    '</div><div style="height:14px"></div></div>'+
    '<div class="m-foot"><button class="m-btn red" id="mTransport">Transport vers l\'hôpital</button></div></div>';
  document.querySelectorAll('.vital').forEach(el=>el.addEventListener('click',()=>{ medicVitals[el.dataset.v]=VITAL_PRESET[el.dataset.v]; medicCare(); }));
  document.getElementById('mTransport').addEventListener('click',()=>gotoMedic('transport'));
}
function medicTransport(){
  const m=MISSION;
  if(!medicHospital){
    appview.innerHTML='<div class="medic">'+medicStrip()+'<div class="medic-body"><div class="hsel">'+
      '<div style="font-family:var(--display);font-weight:700;font-size:22px;margin:4px 0 3px">Choisir l\'hôpital</div><div style="font-size:13px;color:var(--muted);margin-bottom:16px">Destination de transport pour '+m.name+'.</div>'+
      HOSPITALS.map((h,i)=>'<div class="hrow" data-h="'+i+'"><div class="hi"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="15" rx="2"/><path d="M9 6V3h6v3M12 11v5M9.5 13.5h5"/></svg></div><div><div class="hn2">'+h.n+'</div><div class="hd">'+h.d+'</div></div><div class="hdist">'+h.dist+'</div></div>').join('')+
      '</div><div style="height:14px"></div></div>'+
      '<div class="m-foot"><button class="m-btn ghost" id="mBackCare">Retour aux soins</button></div></div>';
    document.querySelectorAll('.hrow').forEach(el=>el.addEventListener('click',()=>{ medicHospital=HOSPITALS[el.dataset.h]; medicTransport(); }));
    document.getElementById('mBackCare').addEventListener('click',()=>gotoMedic('care'));
    return;
  }
  appview.innerHTML='<div class="m-nav">'+medicStrip()+'<div class="medic-body">'+
    '<div class="navtop"><div class="nt">Transport en cours</div><div class="ns">Vers '+medicHospital.n+'</div></div>'+
    '<div class="m-map"><svg viewBox="0 0 360 236" id="medMap2" preserveAspectRatio="xMidYMid slice"></svg><div class="m-eta"><div><div class="en" id="mEta2">8:00</div><div class="el">arrivée</div></div><div class="ed"></div><div><div class="en" style="font-size:14px" id="mDist2">'+medicHospital.dist.replace(' km','')+'</div><div class="el">km</div></div></div></div>'+
    '<div class="navcard"><div class="ncp"><div class="nca" style="background:'+m.col+'">'+m.init+'</div><div><div class="ncn">'+m.name+'</div><div class="ncs">À bord · '+m.blood+' · constantes relevées</div></div><div class="sevtag" style="background:var(--green-bg);color:var(--green)">Stable</div></div></div>'+
    '<div class="navcard"><div class="ncp"><div class="nca" style="background:var(--card-2);color:var(--red)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="15" rx="2"/><path d="M9 6V3h6v3M12 11v5M9.5 13.5h5"/></svg></div><div><div class="ncn">'+medicHospital.n+'</div><div class="ncs">'+medicHospital.d+'</div></div></div></div>'+
    '<div style="height:14px"></div></div>'+
    '<div class="m-foot"><button class="m-btn green" id="mDone">Arrivé à l\'hôpital</button></div></div>';
  document.getElementById('medMap2').innerHTML=cityRouteMap(360,236,'hospital',{route:'medRoute2',amb:'medAmb2'});
  document.getElementById('mDone').addEventListener('click',()=>gotoMedic('done'));
  let t=0, secs=8*60;
  medicAnimTimer=setInterval(()=>{ t=Math.min(1,t+1/(8*60)); secs=Math.max(0,secs-1);
    const e=document.getElementById('mEta2'); if(!e){clearInterval(medicAnimTimer);return;}
    e.textContent=fmt(secs); moveAmb('medRoute2','medAmb2',t); },1000);
}
function medicDone(){
  const m=MISSION;
  appview.innerHTML='<div class="medic"><div class="medic-body"><div class="done-s">'+
    '<div class="dc"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>'+
    '<h2>Mission accomplie</h2><p>Patient transféré et pris en charge à l\'hôpital. Le rapport d\'intervention a été transmis à la régulation.</p>'+
    '<div class="done-sum"><div class="dsr"><span class="dsk">Patient</span><span class="dsv">'+m.name+'</span></div><div class="dsr"><span class="dsk">Type</span><span class="dsv">'+m.type+'</span></div><div class="dsr"><span class="dsk">Identité</span><span class="dsv" style="color:var(--green)">Vérifiée ✓</span></div><div class="dsr"><span class="dsk">Destination</span><span class="dsv">'+(medicHospital?medicHospital.n:'—')+'</span></div><div class="dsr"><span class="dsk">Durée totale</span><span class="dsv">32 min</span></div></div>'+
    '</div></div>'+
    '<div class="m-foot"><button class="m-btn ink" id="mRestart">Retour en service</button></div></div>';
  document.getElementById('mRestart').addEventListener('click',()=>{ medicHospital=null; medicVitals={pouls:null,tension:null,spo2:null}; medicState='idle'; medicTab='board'; renderMedic(); });
}

/* ===== init ===== */
setRole('patient');

</script>
</body>
</html>
